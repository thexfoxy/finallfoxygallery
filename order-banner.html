<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="https://i.postimg.cc/W3khzYwz/tails-prower-480px.png" type="image/x-icon">
    <title data-fa="ثبت سفارش | گالری فاکسی" data-en="Order | Foxy Gallery">ثبت سفارش | گالری فاکسی</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>
        @font-face {
            font-family: 'IBM Plex Sans Arabic';
            src: url('fonts/IBMPlexSansArabic-Bold.ttf') format('truetype');
            font-weight: bold;
            font-style: normal;
        }
        @font-face {
            font-family: 'Celinda';
            src: url('fonts/CelindaRegular-DY8ZD.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
        }
        :root {
            --font-fa: 'IBM Plex Sans Arabic', sans-serif;
            --font-en: 'Celinda', 'Outfit', sans-serif;
        }

        body {
            font-family: var(--font-fa);
            background-color: #050505; 
            color: #eee; 
            margin: 0; padding: 0;
            display: flex; flex-direction: column;
            min-height: 100vh; overflow-x: hidden;
        }

        .navbar {
            position: fixed; top: 0; left: 0; width: 100%;
            background: rgba(13, 13, 13, 0.85); backdrop-filter: blur(10px); 
            -webkit-backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255, 20, 147, 0.3); 
            box-shadow: 0 4px 20px rgba(255, 20, 147, 0.15); 
            display: flex; flex-direction: row-reverse; justify-content: space-between;
            align-items: center; padding: 15px 50px; box-sizing: border-box; z-index: 1000; 
        }
        .navbar .logo { font-size: 1.4rem; font-weight: bold; color: #ff1493; text-shadow: 0 0 10px rgba(255, 20, 147, 0.6); }
        .navbar ul { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: row-reverse; }
        .navbar ul li { margin-left: 20px; }
        .navbar ul li a {
            text-decoration: none; color: #eee; font-weight: bold; font-size: 0.95rem;
            transition: all 0.3s ease; padding: 5px 12px; border-radius: 10px; display: inline-block;
        }
        .navbar ul li a:hover { color: #fff; background: rgba(255, 20, 147, 0.25); box-shadow: 0 0 10px rgba(255, 20, 147, 0.4); }

        .glint-effect { position: relative; overflow: hidden; isolation: isolate; }
        .glint-effect::after {
            content: ""; position: absolute; top: 0; left: -150%; width: 60%; height: 100%;
            background: linear-gradient(to right, rgba(255, 255, 255, 0) 0%, rgba(255, 255, 255, 0.3) 50%, rgba(255, 255, 255, 0) 100%);
            transform: skewX(-25deg); z-index: 5; pointer-events: none; opacity: 0; filter: blur(4px);
        }
        .glint-effect:hover::after { opacity: 1; animation: glintSweep 1.2s cubic-bezier(0.25, 1, 0.5, 1) forwards; }
        @keyframes glintSweep { 0% { left: -150%; } 100% { left: 150%; } }

        .form-box {
            width: 90%; max-width: 600px; margin: 120px auto 50px auto;
            background: rgba(15, 6, 12, 0.5); backdrop-filter: blur(16px);
            border-radius: 28px; border: 1px solid rgba(255, 20, 147, 0.3);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6); padding: 40px 30px; box-sizing: border-box;
        }

        .form-box h2 { text-align: center; margin-top: 0; margin-bottom: 30px; font-size: 1.5rem; color: #fff; text-shadow: 0 0 10px rgba(255, 20, 147, 0.6); }

        .input-group { margin-bottom: 20px; display: flex; flex-direction: column; gap: 8px; }
        .input-group label { font-size: 0.95rem; color: #f0c0d8; font-weight: bold; }
        
        .form-control {
            background: rgba(20, 10, 18, 0.6); border: 1px solid rgba(255, 20, 147, 0.25);
            border-radius: 12px; padding: 12px; color: #fff; font-family: inherit; font-size: 0.95rem;
            outline: none; transition: all 0.3s ease; width: 100%; box-sizing: border-box;
        }
        .form-control:focus { border-color: rgba(255, 20, 147, 0.8); box-shadow: 0 0 12px rgba(255, 20, 147, 0.3); background: rgba(30, 10, 25, 0.8); }

        select.form-control { cursor: pointer; appearance: auto; }
        textarea.form-control { resize: vertical; min-height: 100px; }

        .submit-btn {
            display: block; width: 100%; background: rgba(255, 255, 255, 0.05); color: #e2e8f0;
            padding: 14px; font-size: 1.05rem; font-weight: bold; border-radius: 30px;
            border: 1px solid rgba(255, 20, 147, 0.5); cursor: pointer; transition: all 0.4s ease;
            margin-top: 30px; text-align: center; box-sizing: border-box;
        }
        .submit-btn:hover { color: #fff; border-color: #ff1493; box-shadow: 0 0 20px rgba(255, 20, 147, 0.4); transform: translateY(-2px); }

        body.en { font-family: var(--font-en); direction: ltr; }
        body.en .navbar ul { flex-direction: row; }
        body.en .navbar ul li { margin-left: 0; margin-right: 20px; }
        body.en .navbar .logo { font-family: 'Celinda', sans-serif; }
        body.en .navbar ul li a { font-family: 'Outfit', sans-serif; }
        body.en .form-box h2 { font-family: 'Celinda', sans-serif; letter-spacing: 1px; }

        @media (max-width: 768px) { .navbar { padding: 12px 20px; } .form-box { padding: 30px 20px; margin-top: 100px; } }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo" data-fa="گالری فاکسی 🦊" data-en="Foxy Gallery 🦊">گالری فاکسی 🦊</div>
        <ul>
            <li><a href="index.html" class="glint-effect" data-fa="خانه" data-en="Home">خانه</a></li>
            <li><a href="gallery-list.html" class="glint-effect" data-fa="گالری" data-en="Gallery">گالری</a></li>
        </ul>
    </nav>

    <div class="form-box">
        <h2 data-fa="سفارش بنر اختصاصی" data-en="Custom Banner Order">سفارش بنر اختصاصی</h2>
        
        <form onsubmit="event.preventDefault(); alert('سفارش ثبت شد! / Order Submitted!');">
            <div class="input-group">
                <label data-fa="نام و نام خانوادگی" data-en="Full Name">نام و نام خانوادگی</label>
                <input type="text" class="form-control" required />
            </div>
            <div class="input-group">
                <label data-fa="راه ارتباطی (آیدی تلگرام / دیسکورد)" data-en="Contact (Telegram / Discord ID)">راه ارتباطی (آیدی تلگرام / دیسکورد)</label>
                <input type="text" class="form-control" required />
            </div>
            <div class="input-group">
                <label data-fa="موضوع بنر" data-en="Banner Theme">موضوع بنر</label>
                <select class="form-control">
                    <option data-fa="طرح انیمه" data-en="Anime Style">طرح انیمه</option>
                    <option data-fa="طرح سایبرپانک" data-en="Cyberpunk Style">طرح سایبرپانک</option>
                    <option data-fa="متفرقه" data-en="Other">متفرقه</option>
                </select>
            </div>
            <div class="input-group">
                <label data-fa="متن روی بنر" data-en="Text on Banner">متن روی بنر</label>
                <input type="text" class="form-control" />
            </div>
            <div class="input-group">
                <label data-fa="توضیحات تکمیلی" data-en="Additional Details">توضیحات تکمیلی</label>
                <textarea class="form-control"></textarea>
            </div>
            
            <button type="submit" class="submit-btn glint-effect">
                <span data-fa="ثبت سفارش" data-en="Submit Order">ثبت سفارش</span>
            </button>
        </form>
    </div>

    <script>
        (function applyStoredLang() {
            const lang = localStorage.getItem('foxyLang');
            if (lang === 'en') {
                document.body.classList.add('en');
                document.documentElement.lang = 'en';
                document.documentElement.dir = 'ltr';
                document.querySelectorAll('[data-fa][data-en]').forEach(el => { el.textContent = el.dataset.en; });
                const titleEl = document.querySelector('title');
                if (titleEl) titleEl.textContent = titleEl.dataset.en;
            }
        })();
    </script>
</body>
</html>
